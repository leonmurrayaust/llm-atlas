name: 🤖 Nightly Model Data Pipeline

on:
  schedule:
    - cron: '0 2 * * *'   # 2:00 AM UTC every night
  workflow_dispatch:        # manual trigger from GitHub UI any time
    inputs:
      force_alert:
        description: 'Force Discord alert even if no big changes'
        required: false
        default: 'false'

permissions:
  contents: write
  pull-requests: write

jobs:
  update-data:
    name: Scrape → Diff → PR
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install requests python-dateutil

      - name: Install GitHub CLI
        run: |
          type -p curl >/dev/null || apt install curl -y
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update
          sudo apt install gh -y

      - name: Run data pipeline
        env:
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DISCORD_WEBHOOK:   ${{ secrets.DISCORD_WEBHOOK }}
          FORCE_ALERT:       ${{ github.event.inputs.force_alert }}
        run: |
          python scripts/update_models.py

      - name: Upload run log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-log-${{ github.run_id }}
          path: data/update_log.json
          retention-days: 90

---
# SECOND WORKFLOW: Anomaly Detection
# Runs after any data PR is merged to catch suspicious score changes
